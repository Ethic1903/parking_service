services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: parking
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking -d parking"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - parking-net

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: dev
      HTTP_PORT: "8080"
      HTTP_READ_TIMEOUT_SEC: "5"
      HTTP_WRITE_TIMEOUT_SEC: "10"
      HTTP_IDLE_TIMEOUT_SEC: "60"
      HTTP_SHUTDOWN_TIMEOUT_SEC: "10"
      DB_DRIVER: postgres
      DB_POSTGRES_HOST: postgres
      DB_POSTGRES_PORT: "5432"
      DB_POSTGRES_DBNAME: parking
      DB_POSTGRES_USER: parking
      DB_POSTGRES_PASSWORD: parking
      DB_POSTGRES_SSLMODE: disable
    ports:
      - "8080"
    networks:
      - parking-net

volumes:
  postgres-data:

networks:
  parking-net:
    driver: bridge
